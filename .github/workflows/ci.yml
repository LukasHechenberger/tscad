name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'main' && !contains(github.ref, 'release/') }}
jobs:
  build:
    name: Code Quality
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      DO_NOT_TRACK: '1'
    steps:
      - id: checkout
        name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true
      - id: setup-bun
        name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - id: install
        name: Install dependencies
        run: bun install
      - id: checks
        name: Code Quality Checks
        run: bun --bun turbo check lint test build --continue --summarize
      - name: Report Turbo Summary
        if: always()
        uses: charpeni/turborepo-summary-action@v1
      - id: ensure-clean
        name: Ensure there are no uncommitted changes
        run: git diff --exit-code || (echo "There are uncommitted changes!" && exit 1)
      - id: changesets
        if: ${{ github.event_name == 'push' }}
        name: Changesets
        uses: changesets/action@v1
        with:
          commit: 'chore: Update versions'
          title: 'chore: Update versions'
          publish: bun run changesets:publish
          commitMode: github-api
          version: bun run changesets:version
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to VSCode Marketplace
        run: >
          if git tag --points-at HEAD | grep tscad-vscode; then
            bun --cwd=packages/vscode-extension vscode:publish
          else
            echo "No new tscad-vscode release found (tags: '$(git tag --points-at HEAD)')"
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
